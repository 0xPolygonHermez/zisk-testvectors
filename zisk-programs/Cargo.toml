[package]
name = "zisk-programs"
version = "0.1.0"
edition = "2021"

[workspace.package]
version = "0.1.0"
edition = "2021"

[workspace]
members = [
    "add256/program",
    "arith_eq_384_gen/program",
    "arith_eq_gen/program",
    "bls12_381/program",
    "bn254/program",
    # "diagnostic/program",
    "fcall/program",
    "fcall_msb/program",
    "keccak/program",
    "sha256/program",
    "poseidon2/program",
    "modexp/program",
    "prover_killers/program",
    "secp256k1/program",
    "secp256r1/program",
    #"revm/program",
]
resolver = "2"

[profile.dev]
debug = 0  # No debug info to prevent linker overflow

[profile.release]
opt-level = 3

[profile.bench]
opt-level = 3

[workspace.dependencies]
ziskos = { git = "https://github.com/0xPolygonHermez/zisk.git", branch = "pre-develop-0.16.0" }
zisk-sdk = { git = "https://github.com/0xPolygonHermez/zisk.git", branch = "pre-develop-0.16.0" }
# Local development
# ziskos = { path = "../../zisk/ziskos/entrypoint" }
# zisk-sdk = { path = "../../zisk/sdk" }

rand = "0.8"
serde = { version = "1.0", default-features = false, features = ["derive"] }

[workspace.lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(target_vendor, values("zisk"))'] }

[build-dependencies]
zisk-sdk = { git = "https://github.com/0xPolygonHermez/zisk.git", branch = "pre-develop-0.16.0" }
# Local development
# zisk-sdk = { path = "../../zisk/sdk" }
